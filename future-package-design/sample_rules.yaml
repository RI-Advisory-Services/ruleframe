version: 1

settings:
  row_id:
    column: __validation_row_id__
    strategy: sequential

columns:
  Selected for QA/QC:
    type: string
  Issues noted during QA/QC appointment?:
    type: string
  QA/QC Resolved:
    type: string
  Fuel Type Heat:
    type: string
  Fuel Type DHW:
    type: string
  Customer Status:
    type: string
  Building Square Footage:
    type: number
  Installation Date:
    type: date
  Date Inspected:
    type: date

rules:
  - id: qaqc_unresolved_issue
    name: QA/QC unresolved issue
    severity: error
    fail_when:
      all:
        - column: Selected for QA/QC
          equals: "Yes"
        - column: Issues noted during QA/QC appointment?
          equals: "Yes"
        - column: QA/QC Resolved
          is_blank: true
    message: QA/QC was selected and issues were noted, but QA/QC Resolved is blank.

  - id: fossil_fuel_missing_customer_status
    name: Fossil fuel row missing customer status
    severity: warning
    fail_when:
      all:
        - any:
            - column: Fuel Type Heat
              in: [Natural Gas, Propane]
            - column: Fuel Type DHW
              in: [Natural Gas, Propane]
        - column: Customer Status
          is_blank: true
    message: Customer Status is required when heating or DHW uses fossil fuel.

  - id: building_square_footage_outside_expected_range
    name: Building square footage outside expected range
    severity: error
    fail_when:
      any:
        - column: Building Square Footage
          less_than: 500
        - column: Building Square Footage
          greater_than: 4000
    message: Building Square Footage is outside the expected 500 to 4000 range.

  - id: inspection_more_than_31_days_after_installation
    name: Inspection more than 31 days after installation
    severity: error
    fail_when:
      column: Installation Date
      days_apart_greater_than:
        column: Date Inspected
        days: 31
    message: Date Inspected is more than 31 days away from Installation Date.
