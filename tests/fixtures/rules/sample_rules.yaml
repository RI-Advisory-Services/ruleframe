version: 1
rules:
  - id: qaqc_unresolved_issue
    name: QA/QC unresolved issue
    severity: error
    fail_when:
      all:
        - column: Selected for QA/QC
          equals: "Yes"
        - column: Issues noted during QA/QC appointment?
          equals: "Yes"
        - column: QA/QC Resolved
          is_blank: true
    message: QA/QC was selected and issues were noted, but QA/QC Resolved is blank.

  - id: missing_customer_status
    name: Customer status missing
    severity: warning
    fail_when:
      column: Customer Status
      is_blank: true
    message: Customer Status is blank.

  - id: review_required_without_priority
    name: Manual review required without priority review
    severity: warning
    fail_when:
      all:
        - column: Manual Review Required
          equals: "Yes"
        - not:
            column: Priority Review
            equals: "Yes"
    message: Manual review is required, but Priority Review is not Yes.

  - id: active_quantity_mismatch
    name: Active application quantity mismatch
    severity: error
    fail_when:
      all:
        - any:
            - column: Application Status
              equals: Active
            - column: Application Status
              equals: Completed
        - column: Installed Quantity
          not_equals_column: Reported Quantity
    message: Installed Quantity does not match Reported Quantity for an active application.

  - id: late_active_inspection
    name: Active application late inspection
    severity: error
    fail_when:
      all:
        - column: Application Status
          equals: Active
        - column: Installation Date
          days_apart_greater_than:
            column: Date Inspected
            days: 31
    message: Active application inspection happened more than 31 days from installation.
